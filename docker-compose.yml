version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: javalin_app
    restart: always
    expose:
      - "7000" # Lo exponemos internamente para Nginx, pero no directo a internet
    environment:
      # Pasa tus variables de entorno aquí (las que lee tu Hibernate/Javalin)
      - DB_URL=jdbc:postgresql://db:5432/eventos_db
      - DB_USER=admin
      - DB_PASS=secreto123
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: app_db
    restart: always
    environment:
      POSTGRES_DB: eventos_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secreto123
    volumes:
      - db_data:/var/lib/postgresql/data
      # Aquí mapeamos tu schema.sql para que cree las tablas al iniciar
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    # No mapeamos puertos (ej. 5432:5432) por seguridad. Solo 'app' debe ver la DB.

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Archivo de configuración principal de Nginx
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Carpeta con los certificados SSL que generaste
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app

volumes:
  db_data: