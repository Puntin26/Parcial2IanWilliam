<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Eventos PUCMM</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/estilos.css">
  <style>
    /* ── Toggle ojo ── */
    .btn-eye {
      border-color:
              #ced4da;
      background: transparent;
      color:
              #6c757d;
    }
    .btn-eye:hover {
      background:
              #f8f9fa;
      color: #333;
    }
    /* ── Feedback inline ── */
    .field-feedback {
      font-size: 0.78rem;
      min-height: 1.1rem;
      margin-top: 4px;
    }
    /* ── Spinner botón ── */
    .btn-submit-spinner { display: none; }
    .loading .btn-submit-text    { display: none; }
    .loading .btn-submit-spinner { display: inline-block; }
    /* ── Alerta de error animada ── */
    #alertaError {
      display: none;
      animation: fadeIn 0.3s ease;
    }
    #alertaError.visible { display: flex; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    /* ── Encabezado de marca ── */
    .brand-header {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .brand-header .brand-icon { font-size: 2.2rem; line-height: 1; }
    .brand-header h2 {
      font-size: 1.4rem;
      font-weight: 700;
      margin: 0.4rem 0 0.2rem;
    }
  </style>
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary" style="min-height: 100vh;">
<main class="w-100 m-auto px-3" style="max-width: 420px;">
  <div class="card sombra-suave p-4">
    <!-- Encabezado de marca -->
    <div class="brand-header">
      <div class="brand-icon">🎓</div>
      <h2>Iniciar sesión</h2>
      <p class="text-muted small mb-0">Accede a los eventos académicos PUCMM</p>
    </div>
    <!-- ── Alerta de error (servidor o JS) ── -->
    <!--
      Spring Security redirige a /login?error cuando las credenciales fallan.
      Tu controlador debe capturar ese parámetro y pasarlo al modelo así:
        @GetMapping("/login")
        public String loginPage(@RequestParam(value="error", required=false) String error,
                                @RequestParam(value="logout", required=false) String logout,
                                Model model) {
            if (error != null)  model.addAttribute("loginError", true);
            if (logout != null) model.addAttribute("loginLogout", true);
            return "templates/login";
        }
    -->
    <div id="alertaError"
         class="alert alert-danger alert-dismissible align-items-center gap-2 py-2 mb-3
                <#if loginError??>visible</#if>"
         role="alert">
      <span>⚠️</span>
      <span id="mensajeError">
        <#if error??>${error}<#else>Credenciales incorrectas. Verifica tu correo y contraseña.</#if>
      </span>
      <button type="button" class="btn-close btn-sm ms-auto"
              onclick="ocultarError()" aria-label="Cerrar"></button>
    </div>
    <!-- ── Alerta de cierre de sesión ── -->
    <#if loginLogout??>
    <div class="alert alert-success alert-dismissible fade show py-2 mb-3" role="alert">
      <small>✔ Sesión cerrada correctamente.</small>
      <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
    </div>
  </#if>
  <!-- ── Formulario ── -->
  <form id="formLogin" method="POST" action="/login" novalidate>
    <!-- Correo -->
    <div class="mb-3">
      <label for="correo" class="form-label fw-semibold">
        Correo electrónico <span class="text-danger">*</span>
      </label>
      <input
              type="email"
              class="form-control"
              id="correo"
              name="correo"
              placeholder="tucorreo@pucmm.edu.do"
              autocomplete="email"
              aria-describedby="correoFeedback"
              required
      >
      <div class="field-feedback text-danger" id="correoFeedback"></div>
    </div>
    <!-- Contraseña -->
    <div class="mb-2">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <label for="password" class="form-label fw-semibold mb-0">
          Contraseña <span class="text-danger">*</span>
        </label>
      </div>
      <div class="input-group">
        <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                placeholder="Tu contraseña"
                autocomplete="current-password"
                aria-describedby="passwordFeedback"
                required
        >
        <button type="button" class="btn btn-eye border-start-0"
                id="togglePassword" tabindex="-1" aria-label="Mostrar contraseña">
          👁
        </button>
      </div>
      <div class="field-feedback text-danger" id="passwordFeedback"></div>
    </div>
    <!-- Recordarme -->
    <div class="mb-4 mt-2">
      <div class="form-check">
        <input class="form-check-input" type="checkbox" id="recordarme" name="remember-me">
        <label class="form-check-label small text-muted" for="recordarme">
          Recordar mi sesión
        </label>
      </div>
    </div>
    <!-- Botón -->
    <button class="btn btn-primary w-100 py-2 fw-semibold" type="submit" id="btnEntrar">
      <span class="btn-submit-text">Entrar</span>
      <span class="btn-submit-spinner spinner-border spinner-border-sm"
            role="status" aria-hidden="true"></span>
    </button>
  </form>
  <hr class="my-3">
  <div class="text-center small">
    ¿No tienes cuenta?
    <a href="/registro" class="fw-semibold text-decoration-none">Regístrate aquí</a>
  </div>
  </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  (function () {
    /* ── Toggle ver/ocultar contraseña ── */
    const passwordInput = document.getElementById('password');
    document.getElementById('togglePassword').addEventListener('click', function () {
      const isText = passwordInput.type === 'text';
      passwordInput.type  = isText ? 'password' : 'text';
      this.textContent    = isText ? '👁' : '🙈';
    });
    /* ── Ocultar alerta de error ── */
    window.ocultarError = function () {
      document.getElementById('alertaError').classList.remove('visible');
    };
    /* ── Helpers inline ── */
    function setInvalid(input, fbId, msg) {
      input.classList.add('is-invalid');
      input.classList.remove('is-valid');
      document.getElementById(fbId).textContent = msg;
    }
    function setValid(input, fbId) {
      input.classList.remove('is-invalid');
      input.classList.add('is-valid');
      document.getElementById(fbId).textContent = '';
    }
    function showError(msg) {
      const alerta  = document.getElementById('alertaError');
      document.getElementById('mensajeError').textContent = msg;
      alerta.classList.add('visible');
    }
    /* ── Validación blur: correo ── */
    const correoInput = document.getElementById('correo');
    correoInput.addEventListener('blur', function () {
      if (!this.value) {
        setInvalid(this, 'correoFeedback', 'El correo es obligatorio.');
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value)) {
        setInvalid(this, 'correoFeedback', 'Ingresa un correo válido.');
      } else {
        setValid(this, 'correoFeedback');
      }
    });
    /* ── Validación blur: contraseña ── */
    passwordInput.addEventListener('blur', function () {
      if (!this.value) {
        setInvalid(this, 'passwordFeedback', 'La contraseña es obligatoria.');
      } else {
        setValid(this, 'passwordFeedback');
      }
    });
    /* ── Envío del formulario ── */
    document.getElementById('formLogin').addEventListener('submit', function (e) {
      let valid = true;
      if (!correoInput.value || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correoInput.value)) {
        setInvalid(correoInput, 'correoFeedback', 'Ingresa un correo válido.');
        valid = false;
      }
      if (!passwordInput.value) {
        setInvalid(passwordInput, 'passwordFeedback', 'La contraseña es obligatoria.');
        valid = false;
      }
      if (!valid) {
        e.preventDefault();
        showError('Completa todos los campos antes de continuar.');
        const firstInvalid = this.querySelector('.is-invalid');
        if (firstInvalid) firstInvalid.focus();
        return;
      }
      /* Estado de carga */
      const btn = document.getElementById('btnEntrar');
      btn.classList.add('loading');
      btn.disabled = true;
    });
  })();
</script>
</body>
</html>
