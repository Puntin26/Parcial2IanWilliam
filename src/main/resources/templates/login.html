<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Eventos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/estilos.css">
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary" style="min-height: 100vh;">

<main class="form-signin w-100 m-auto" style="max-width: 420px;">
  <div class="card sombra-suave p-4">
    <h2 class="text-center mb-3">Iniciar Sesión</h2>
    <p class="text-muted text-center mb-4">Accede para ver los eventos académicos.</p>

    <#if error??>
    <div class="alert alert-danger" role="alert">
      ${error}
    </div>
  </#if>

  <form id="formLogin" method="POST" action="/login">
    <div class="mb-3">
      <label for="correo" class="form-label">Correo Electrónico</label>
      <input type="email" class="form-control" id="correo" name="correo" required>
    </div>

    <div class="mb-4">
      <label for="password" class="form-label">Contraseña</label>
      <input type="password" class="form-control" id="password" name="password" required>
    </div>

    <button class="btn btn-primary w-100 py-2" type="submit">Entrar</button>
  </form>

  <div class="text-center mt-3">
    <a href="/registro" class="text-decoration-none">¿No tienes cuenta? Regístrate</a>
  </div>
  </div>
</main>

<script>
  document.getElementById('formLogin').addEventListener('submit', function(e) {
    const correo = document.getElementById('correo').value;
    const password = document.getElementById('password').value;

    if (correo.trim() === '' || password.trim() === '') {
      e.preventDefault();
      alert('Todos los campos son obligatorios.');
      return;
    }

    if (password.length < 4) {
      e.preventDefault();
      alert('La contraseña debe ser mayor a 4 caracteres.');
    }
  });
</script>

</body>
</html>
