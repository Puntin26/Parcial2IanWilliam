<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administrador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/estilos.css">
</head>
<body>

<nav class="navbar navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="/eventos">Panel de Control PUCMM</a>
    <div class="d-flex align-items-center">
      <span class="text-white me-3">Hola, ${usuario.correo} (${usuario.rol})</span>
      <a href="/logout" class="btn btn-outline-light btn-sm">Cerrar Sesión</a>
    </div>
  </div>
</nav>

<div class="container">
  <h2 class="mb-4">Gestión de Usuarios</h2>

  <div class="card sombra-suave">
    <div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Correo</th>
          <th>Rol Actual</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <#list usuarios as u>
        <tr>
          <td>${u.id}</td>
          <td>${u.correo}</td>
          <td>
            <form method="POST" action="/admin/usuarios/rol/${u.id}" class="d-flex gap-2">
              <select name="rol" class="form-select form-select-sm" style="width: 150px;">
                <option value="PARTICIPANTE" <#if u.rol == 'PARTICIPANTE'>selected</#if>>Participante</option>
              <option value="ORGANIZADOR" <#if u.rol == 'ORGANIZADOR'>selected</#if>>Organizador</option>
            <option value="ADMINISTRADOR" <#if u.rol == 'ADMINISTRADOR'>selected</#if>>Administrador</option>
          </select>
          <button type="submit" class="btn btn-primary btn-sm" <#if u.rol == 'ADMINISTRADOR'>disabled</#if>>Guardar</button>
        </form>
        </td>
        <td>
                            <span class="badge ${u.bloqueado?then('bg-danger', 'bg-success')}">
                                ${u.bloqueado?then('Bloqueado', 'Activo')}
                            </span>
        </td>
        <td>
          <form method="POST" action="/admin/usuarios/bloquear/${u.id}">
            <button type="submit" class="btn ${u.bloqueado?then('btn-success', 'btn-danger')} btn-sm"
            <#if u.rol == 'ADMINISTRADOR'>disabled</#if>>
          ${u.bloqueado?then('Desbloquear', 'Bloquear')}
          </button>
          </form>
        </td>
        </tr>
        </#list>
        </tbody>
      </table>
    </div>
  </div>
</div>

</body>
</html>
