<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estadísticas del Evento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/css/estilos.css">
</head>
<body class="bg-body-tertiary">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container-fluid">
    <a class="navbar-brand" href="/eventos">🎓 Sistema de Eventos PUCMM</a>
    <div class="d-flex align-items-center">
      <span class="navbar-text text-white me-3">Hola, ${usuario.correo}</span>
      <a href="/eventos" class="btn btn-outline-light btn-sm">Volver a Eventos</a>
    </div>
  </div>
</nav>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8 text-center">
      <h2 class="mb-2" id="tituloEvento">Cargando estadísticas...</h2>
      <p class="text-muted mb-4">Relación de Inscritos vs. Asistentes</p>

      <div class="card sombra-suave p-4">
        <div class="row align-items-center">
          <div class="col-md-6">
            <canvas id="graficoAsistencia"></canvas>
          </div>
          <div class="col-md-6 text-start mt-4 mt-md-0">
            <h4 class="text-primary">Resumen:</h4>
            <ul class="list-group list-group-flush fs-5">
              <li class="list-group-item">👥 Total Inscritos: <strong id="lblInscritos">0</strong></li>
              <li class="list-group-item">✅ Asistieron: <strong id="lblAsistentes" class="text-success">0</strong></li>
              <li class="list-group-item">📊 Porcentaje: <strong id="lblPorcentaje">0%</strong></li>
            </ul>
          </div>
        </div>
      </div>

      <input type="hidden" id="eventoIdOculto" value="${eventoId}">
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    // Obtenemos el ID del evento desde el input oculto
    const idEvento = document.getElementById("eventoIdOculto").value;

    // Llamamos a la API que tú programaste en Main.java
    fetch("/api/estadisticas/" + idEvento)
            .then(respuesta => respuesta.json())
            .then(data => {
              if (data.ok) {
                // Llenar los textos
                document.getElementById("tituloEvento").innerText = "Estadísticas: " + data.evento;
                document.getElementById("lblInscritos").innerText = data.totalInscritos;
                document.getElementById("lblAsistentes").innerText = data.totalAsistentes;
                document.getElementById("lblPorcentaje").innerText = data.porcentajeAsistencia;

                // Dibujar el gráfico de dona
                const ctx = document.getElementById('graficoAsistencia').getContext('2d');
                const noAsistieron = data.totalInscritos - data.totalAsistentes;

                new Chart(ctx, {
                  type: 'doughnut',
                  data: {
                    labels: ['Asistieron', 'No Asistieron (Ausentes)'],
                    datasets: [{
                      data: [data.totalAsistentes, noAsistieron],
                      backgroundColor: ['#198754', '#dc3545'], // Verde y Rojo de Bootstrap
                      hoverOffset: 4
                    }]
                  },
                  options: {
                    responsive: true,
                    plugins: {
                      legend: { position: 'bottom' }
                    }
                  }
                });
              } else {
                document.getElementById("tituloEvento").innerText = "Error cargando datos";
              }
            })
            .catch(error => console.error("Error consultando API:", error));
  });
</script>

</body>
</html>
