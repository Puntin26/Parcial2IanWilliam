<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Usuario - Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body class="d-flex align-items-center py-4 bg-body-tertiary" style="min-height: 100vh;">

<main class="form-signin w-100 m-auto" style="max-width: 420px;">
    <div class="card sombra-suave p-4">
        <h2 class="text-center mb-3">Crear cuenta</h2>
        <p class="text-muted text-center mb-4">Regístrate como participante para inscribirte en eventos.</p>

        <#if error??>
        <div class="alert alert-danger">${error}</div>
    </#if>

    <#if exito??>
    <div class="alert alert-success">${exito}</div>
</#if>

<form method="POST" action="/registro">
    <div class="mb-3">
        <label for="correo" class="form-label">Correo Electrónico</label>
        <input type="email" class="form-control" id="correo" name="correo" required>
    </div>

    <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" required>
    </div>

    <div class="mb-4">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="password" name="password" required>
    </div>

    <button class="btn btn-success w-100 py-2" type="submit">Registrarme</button>
</form>

<div class="text-center mt-3">
    <a href="/login">Ya tengo cuenta</a>
</div>
</div>
</main>

</body>
</html>
