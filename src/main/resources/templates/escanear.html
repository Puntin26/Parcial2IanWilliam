<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escanear Asistencia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/estilos.css">
</head>
<body class="bg-body-tertiary">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="/eventos">🎓 Sistema de Eventos PUCMM</a>
        <div class="d-flex align-items-center">
            <span class="navbar-text text-white me-3">Hola, ${usuario.username!usuario.correo}</span>
            <a href="/eventos" class="btn btn-outline-light btn-sm">Volver a Eventos</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <h2 class="mb-4">Escáner de Asistencia</h2>
            <p class="text-muted">Apunta la cámara al código QR del participante.</p>

            <div class="card sombra-suave p-4">
                <div id="lector-qr" class="mx-auto" style="width: 100%; max-width: 500px;"></div>
                <div id="resultado" class="mt-4 fw-bold fs-5"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>

<script>
    function onScanSuccess(decodedText, decodedResult) {
        try {
            const datosQr = JSON.parse(decodedText);
            const token = datosQr.token;

            fetch('/api/asistencia', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: token })
            })
                .then(respuesta => respuesta.json())
                .then(data => {
                    const resDiv = document.getElementById('resultado');

                    if (data.ok) {
                        resDiv.innerHTML = '<span class="text-success">✅ ' + data.mensaje + '</span>';
                    } else {
                        resDiv.innerHTML = '<span class="text-danger">❌ ' + data.mensaje + '</span>';
                    }

                    setTimeout(() => { resDiv.innerHTML = ""; }, 4000);
                });

        } catch (error) {
            document.getElementById('resultado').innerHTML =
                '<span class="text-danger">❌ Error: Código QR no válido para este sistema.</span>';
        }
    }

    let html5QrcodeScanner = new Html5QrcodeScanner(
        "lector-qr",
        { fps: 10, qrbox: { width: 250, height: 250 } },
        false
    );

    html5QrcodeScanner.render(onScanSuccess);
</script>

</body>
</html>
